<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер курсу · B1+ · Immortal School</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #001df4;
    --blue-light: rgba(0,29,244,0.08);
    --blue-mid: rgba(0,29,244,0.15);
    --blue-border: rgba(0,29,244,0.25);
    --grey: #f5f6f1;
    --grey-dark: #e8e9e3;
    --black: #000000;
    --text: #111111;
    --text2: #555550;
    --text3: #999990;
    --white: #ffffff;
    --green: #16a34a;
    --green-light: rgba(22,163,74,0.08);
    --green-border: rgba(22,163,74,0.25);
    --amber: #d97706;
    --amber-light: rgba(217,119,6,0.08);
    --amber-border: rgba(217,119,6,0.3);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--grey);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Top bar */
  .topbar {
    background: var(--blue);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Work Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.01em;
  }
  .logo span { font-weight: 400; opacity: .7; }
  .level-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--blue);
    background: var(--white);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .container { max-width: 540px; margin: 0 auto; padding: 20px 16px 48px; }

  /* Hero card */
  .hero {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
    border: 1px solid var(--grey-dark);
    position: relative;
    overflow: hidden;
  }
  .hero-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }
  .hero-main {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-bottom: 12px;
  }
  .pct-num {
    font-size: 52px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .pct-sym { font-size: 28px; font-weight: 300; color: var(--blue); opacity: .5; margin-bottom: 6px; }

  .bar-track {
    background: var(--grey);
    border-radius: 4px;
    height: 5px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .bar-fill {
    height: 5px;
    border-radius: 4px;
    background: var(--blue);
    transition: width .5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .hero-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .hstat { display: flex; align-items: center; gap: 5px; }
  .hstat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .hstat-dot.blue { background: var(--blue); }
  .hstat-dot.green { background: var(--green); }
  .hstat-dot.amber { background: var(--amber); }
  .hstat-text { font-size: 12px; color: var(--text2); }
  .hstat-text strong { font-weight: 600; color: var(--text); }

  .next-row {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--grey-dark);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text3);
  }
  .next-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blue);
    flex-shrink: 0;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .next-name { font-weight: 600; color: var(--text); }

  .done-msg {
    display: none;
    text-align: center;
    padding: 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    background: var(--green-light);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
    border: 1px solid var(--green-border);
  }
  .done-msg.show { display: block; }

  /* Topics */
  .topics { display: grid; gap: 6px; }

  .topic {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--grey-dark);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .topic:hover { border-color: rgba(0,29,244,0.2); }
  .topic.done { border-color: var(--green-border); }
  .topic.revision { border-color: var(--amber-border); }
  .topic.revision.done { border-color: var(--green-border); }

  .topic-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
  }

  .check-circle {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--grey-dark);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    cursor: pointer;
  }
  .check-circle:hover { border-color: var(--blue); }
  .topic.done .check-circle { background: var(--green); border-color: var(--green); }
  .topic.revision:not(.done) .check-circle:hover { border-color: var(--amber); }
  .check-circle svg { display: none; }
  .topic.done .check-circle svg { display: block; }

  .topic-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    min-width: 16px;
    font-variant-numeric: tabular-nums;
  }
  .topic.done .topic-num { color: var(--green); opacity: .6; }

  .topic-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
    transition: color .15s;
  }
  .topic.done .topic-name { color: var(--green); }
  .topic.revision:not(.done) .topic-name { color: var(--amber); }

  .rev-tag {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    background: var(--amber-light);
    color: var(--amber);
    border: 1px solid var(--amber-border);
    flex-shrink: 0;
  }
  .topic.done .rev-tag {
    background: var(--green-light);
    color: var(--green);
    border-color: var(--green-border);
  }

  .expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 10px;
    padding: 0;
    transition: transform .25s, color .15s;
    flex-shrink: 0;
  }
  .expand-btn:hover { color: var(--blue); }
  .expand-btn.open { transform: rotate(180deg); }

  /* Body */
  .topic-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }
  .topic-body.open { max-height: 500px; }
  .topic-body-inner {
    padding: 0 14px 14px 60px;
    display: grid;
    gap: 10px;
  }

  .detail-block {}
  .detail-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .topic.done .detail-label { color: var(--green); }

  .skill-list { display: grid; gap: 4px; }
  .skill-item {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    padding-left: 12px;
    position: relative;
  }
  .skill-item::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--text3);
    font-size: 10px;
  }
  .topic.done .skill-item { color: var(--green); opacity: .75; }

  .grammar-pill {
    background: var(--grey);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
    border-left: 3px solid var(--blue);
  }
  .topic.done .grammar-pill {
    border-left-color: var(--green);
    color: var(--green);
    opacity: .8;
    background: var(--green-light);
  }
  .grammar-pill strong { color: var(--text); font-weight: 600; }
  .topic.done .grammar-pill strong { color: var(--green); }

  /* Footer */
  .footer {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--grey-dark);
  }
  .footer-text { font-size: 11px; color: var(--text3); font-weight: 500; }
  .reset-btn {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--grey-dark);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    transition: all .15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text3); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Immortal <span>school</span></div>
  <div class="level-badge">B1+</div>
</div>

<div class="container">

  <div class="hero">
    <div class="hero-title">Трекер курсу</div>
    <div class="hero-main">
      <div class="pct-num" id="pct">0</div>
      <div class="pct-sym">%</div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="hero-stats">
      <div class="hstat">
        <div class="hstat-dot blue"></div>
        <div class="hstat-text"><strong id="s-done">0</strong> пройдено</div>
      </div>
      <div class="hstat">
        <div class="hstat-dot green"></div>
        <div class="hstat-text"><strong id="s-left">6</strong> залишилось</div>
      </div>
      <div class="hstat">
        <div class="hstat-dot amber"></div>
        <div class="hstat-text">ревізія: <strong id="s-rev">0/1</strong></div>
      </div>
    </div>
    <div class="next-row" id="next-row">
      <div class="next-dot"></div>
      <span>Наступна тема:</span>
      <span class="next-name" id="next-name">Relationships</span>
    </div>
  </div>

  <div class="done-msg" id="done-msg">🎉 Всі теми пройдено — вітаємо з завершенням курсу!</div>

  <div class="topics" id="topics-root"></div>

  <div class="footer">
    <span class="footer-text">Immortal School · B1+ · 2024–25</span>
    <button class="reset-btn" onclick="resetAll()">Скинути прогрес</button>
  </div>

</div>

<script>
const TOPICS = [
  {
    id: 1,
    name: "Relationships",
    rev: false,
    skills: [
      "Listen to conversations about different types of relationships and discuss which ones are most important in your life",
      "Describe people you know — their character, how well you get on, and what makes the relationship good or difficult"
    ],
    grammar: "Use <strong>-ever words</strong> (whatever, whoever, whenever, wherever, however) to talk about relationships in a more natural and flexible way"
  },
  {
    id: 2,
    name: "Health problems",
    rev: false,
    skills: [
      "Learn vocabulary to describe common health problems and symptoms",
      "Listen to conversations between patients and doctors and discuss what advice was given",
      "Role-play a doctor's appointment — describe your symptoms and give or receive medical advice"
    ],
    grammar: "Master <strong>verb patterns</strong> — verbs followed by -ing (enjoy, finish, miss, avoid) vs. infinitive with to (agree, decide, hope, refuse)"
  },
  {
    id: 3,
    name: "Quality of life",
    rev: false,
    skills: [
      "Read about the Gallup World Poll and discuss what really makes people happy — money, community, health, or something else?"
    ],
    grammar: "<strong>Patterns after wish:</strong> wish + past simple (present situations you want to change), wish + could (things you want to be able to do), wish + would (things you want others to do differently)"
  },
  {
    id: 4,
    name: "Coping with Disasters and Emergencies",
    rev: false,
    skills: [
      "Discuss how prepared you are for an emergency at home",
      "Learn to warn someone about a dangerous situation"
    ],
    grammar: "Master <strong>indirect speech</strong> — report what people say and instruct others using said, told, asked"
  },
  {
    id: 5,
    name: "English in action: respond to news",
    rev: false,
    skills: [
      "Discuss different emotions and when you last experienced them",
      "Listen to conversations where people share good and bad news and practise responding naturally",
      "Roleplay sharing your own news and reacting to a partner's"
    ],
    grammar: "Learn and use natural <strong>phrases for responding to news</strong> in different emotional contexts"
  },
  {
    id: 6,
    name: "Revision",
    rev: true,
    skills: [
      "Review all topics: Relationships, Health, Quality of life, Emergencies, Responding to news",
      "Practise all grammar from the course"
    ],
    grammar: "All grammar: <strong>-ever words · verb patterns · wish patterns · indirect speech · responding phrases</strong>"
  }
];

const TOTAL = TOPICS.length;
const openMap = {};

function getState(){
  try { return JSON.parse(localStorage.getItem('immortal_b1plus')||'{}'); }
  catch(e){ return {}; }
}

function render(){
  const state = getState();
  const done = TOPICS.filter(t=>state[t.id]).length;
  const revDone = TOPICS.filter(t=>t.rev&&state[t.id]).length;
  const revTotal = TOPICS.filter(t=>t.rev).length;
  const pct = Math.round(done/TOTAL*100);

  document.getElementById('pct').textContent = pct;
  document.getElementById('bar').style.width = pct+'%';
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = TOTAL-done;
  document.getElementById('s-rev').textContent = revDone+'/'+revTotal;

  const next = TOPICS.find(t=>!state[t.id]);
  const nextRow = document.getElementById('next-row');
  if(next){ nextRow.style.display='flex'; document.getElementById('next-name').textContent=next.name; }
  else { nextRow.style.display='none'; }

  document.getElementById('done-msg').classList.toggle('show', done===TOTAL);

  const root = document.getElementById('topics-root');
  root.innerHTML='';

  TOPICS.forEach(t=>{
    const isDone = !!state[t.id];
    const isOpen = !!openMap[t.id];

    const div = document.createElement('div');
    div.className = 'topic' + (isDone?' done':'') + (t.rev?' revision':'');

    div.innerHTML = `
      <div class="topic-header">
        <div class="check-circle" data-check="${t.id}">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="topic-num">${String(t.id).padStart(2,'0')}</span>
        <span class="topic-name">${t.name}</span>
        ${t.rev?`<span class="rev-tag">Ревізія</span>`:''}
        <button class="expand-btn${isOpen?' open':''}" data-expand="${t.id}" aria-label="деталі">▼</button>
      </div>
      <div class="topic-body${isOpen?' open':''}">
        <div class="topic-body-inner">
          <div class="detail-block">
            <div class="detail-label">Навички</div>
            <div class="skill-list">
              ${t.skills.map(s=>`<div class="skill-item">${s}</div>`).join('')}
            </div>
          </div>
          <div class="detail-block">
            <div class="detail-label">Граматичний фокус</div>
            <div class="grammar-pill">${t.grammar}</div>
          </div>
        </div>
      </div>
    `;

    div.querySelector(`[data-check="${t.id}"]`).addEventListener('click', e=>{
      e.stopPropagation();
      const s = getState();
      s[t.id] = !s[t.id];
      localStorage.setItem('immortal_b1plus', JSON.stringify(s));
      render();
    });

    div.querySelector(`[data-expand="${t.id}"]`).addEventListener('click', e=>{
      e.stopPropagation();
      openMap[t.id] = !openMap[t.id];
      render();
    });

    root.appendChild(div);
  });
}

function resetAll(){
  if(confirm('Скинути весь прогрес курсу?')){
    localStorage.removeItem('immortal_b1plus');
    render();
  }
}

render();
</script>
</body>
</html>
